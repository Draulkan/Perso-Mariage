<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2236%25%22%20cy%3D%2230%25%22%20r%3D%2272%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23c2d2e0%22/%3E%3Cstop%20offset%3D%2248%25%22%20stop-color%3D%22%2393a9bf%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%235f7d9a%22/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2230%22%20fill%3D%22url%28%23g%29%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2224%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-opacity%3D%220.45%22%20stroke-width%3D%221.4%22%20stroke-dasharray%3D%223%203%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%25%22%20dominant-baseline%3D%22central%22%20text-anchor%3D%22middle%22%20font-family%3D%22Georgia%2C%20%27Times%20New%20Roman%27%2C%20serif%22%20font-style%3D%22italic%22%20font-weight%3D%22400%22%20font-size%3D%2230%22%20fill%3D%22%23ffffff%22%3EAC%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Great+Vibes&family=Jost:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.css">
<style>
  :root{
    /* brand accents */
    --cream:#edeade;
    --pink:#e3bec2;
    --blue:#b0c2d4;
    --sage:#9baa9d;

    --ink:#4b4a44;
    --muted:#8a897f;
    --line:#ece9df;

    --serif:'Cormorant Garamond', Georgia, serif;
    --sans:'Jost', system-ui, sans-serif;
    --script:'Pinyon Script', cursive;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; background:#ffffff; scrollbar-gutter:stable both-edges; }
  body{
    background:#ffffff;
    color:var(--ink);
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
  }

  /* faint accent wash in the far corners — background stays white */
  body::before,body::after{
    content:"";
    position:fixed;
    width:46vmax;height:46vmax;
    border-radius:50%;
    filter:blur(60px);
    opacity:.10;
    pointer-events:none;
    z-index:0;
  }
  body::before{ top:-22vmax; left:-20vmax; background:radial-gradient(circle,var(--blue),transparent 70%); }
  body::after{ bottom:-24vmax; right:-22vmax; background:radial-gradient(circle,var(--pink),transparent 70%); }

  .stage{
    position:relative;
    z-index:1;
    width:min(96vw,760px);
    margin:0 auto;
    padding:0 16px 1vh;
    text-align:center;
  }

  /* ---------- top monogram / intro ---------- */
  .crest{
    opacity:0;
    transform:translateY(8px);
    transition:opacity .9s ease, transform .9s ease;
    transition-delay:.1s;
    margin-bottom:6px;
  }
  .stage[data-phase="open"] .crest{ opacity:1; transform:none; }
  .crest .amp{
    font-family:var(--script);
    font-size:42px;
    line-height:1;
    color:var(--sage);
  }
  .eyebrow{
    position:relative;
    z-index:5;
    white-space:nowrap;
    font-family:var(--sans);
    font-weight:400;
    letter-spacing:clamp(.2em,1vw,.42em);
    text-transform:uppercase;
    font-size:clamp(9px,2.6vw,11px);
    color:var(--muted);
    margin:0;
    opacity:1;
    transition:opacity .6s ease;
  }
  .stage[data-phase="open"] .eyebrow.intro{ opacity:0; pointer-events:none; }

  .invite-names{
    position:relative;
    z-index:5;
    white-space:nowrap;
    font-family:var(--script);
    font-weight:400;
    font-size:clamp(14px,4.5vw,20px);
    color:#5f7d9a;
    margin:4px 0 0;
    opacity:0;
    animation:names-appear 1.4s ease .5s forwards;
    transition:opacity .6s ease;
  }
  @keyframes names-appear{
    from{ opacity:0; transform:translateY(8px); }
    to  { opacity:1; transform:translateY(0); }
  }
  .stage[data-phase="open"] .invite-names.intro{ opacity:0; pointer-events:none; animation:none; }

  /* ---------- envelope scene ---------- */
  .scene{
    position:relative;
    width:100%;
    max-width:min(92vw,500px);
    aspect-ratio:4 / 3;
    max-height:min(50vh,440px);
    margin:clamp(-44px,-5vmin,-8px) auto 0;
  }
  .layer{
    position:absolute;
    left:50%;
    top:50%;
    width:86%;
    transform:translate(-50%,-50%);
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  /* open envelope (back layer) + front pocket overlay share transforms */
  .env-open,
  .env-front{
    opacity:0;
    transition:opacity .6s ease .25s, transform .9s cubic-bezier(.22,1,.36,1);
  }
  .env-open{
    filter:drop-shadow(0 18px 26px rgba(120,120,110,.16));
    z-index:1;
  }
  /* duplicate of the envelope, clipped to ONLY the front pocket, sits ABOVE the
     photos so the bottom of the cards tucks behind it — they stay in the envelope */
  .env-front{
    z-index:3;
    clip-path:polygon(50% 56%, 74% 61%, 74% 87%, 27% 87%, 27% 61%);
    filter:drop-shadow(0 14px 18px rgba(120,120,110,.12));
  }
  .stage[data-phase="opening"] .env-open,
  .stage[data-phase="opening"] .env-front,
  .stage[data-phase="open"] .env-open{ opacity:1; }
  .stage[data-phase="open"] .env-front{ opacity:0; }
  .stage[data-phase="open"] .env-open,
  .stage[data-phase="open"] .env-front{
    transform:translate(-50%,-48%) scale(1.22);
  }

  /* the photos / cards — they rise and nestle INSIDE the envelope */
  .contents{
    width:74%;
    opacity:0;
    transform:translate(-50%,18%) scale(.62);
    transform-origin:center bottom;
    transition:opacity .7s ease .35s, transform 1.05s cubic-bezier(.22,1,.36,1) .35s;
    filter:drop-shadow(0 10px 16px rgba(120,120,110,.16));
    z-index:2;
  }
  .stage[data-phase="open"] .contents{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.4);
    pointer-events:auto;
    cursor:zoom-in;
  }

  /* closed envelope (sits on top until opened) */
  .env-closed{
    opacity:1;
    transform:translate(-50%,-50%) scale(0.82);
    transition:opacity .5s ease .15s, transform .9s cubic-bezier(.22,1,.36,1);
    filter:drop-shadow(0 18px 26px rgba(120,120,110,.18));
    z-index:3;
  }
  .stage[data-phase="opening"] .env-closed,
  .stage[data-phase="open"] .env-closed{ opacity:0; }
  .stage[data-phase="opening"] .env-closed,
  .stage[data-phase="open"] .env-closed{
    transform:translate(-50%,-48%) scale(1.22);
  }

  /* ---------- wax seal (clickable) ---------- */
  .seal{
    position:absolute;
    left:50%;
    top:62%;
    width:48px;height:48px;
    transform:translate(-50%,-50%);
    border:none;
    padding:0;
    cursor:pointer;
    z-index:4;
    background:transparent;
    transition:transform .45s cubic-bezier(.5,-0.4,.5,1.4), opacity .4s ease;
  }
  .stage[data-phase="opening"] .seal,
  .stage[data-phase="open"] .seal{
    transform:translate(-50%,30px) scale(.2) rotate(-32deg);
    opacity:0;
    pointer-events:none;
  }
  .seal-disc{
    position:absolute;
    inset:0;
    border-radius:48% 52% 50% 50%/52% 48% 52% 48%;
    background:
      radial-gradient(circle at 36% 30%, #c2d2e0 0%, #93a9bf 48%, #5f7d9a 100%);
    box-shadow:
      inset 0 2px 5px rgba(255,255,255,.35),
      inset 0 -3px 6px rgba(25,45,65,.32),
      0 3px 7px rgba(55,75,95,.40);
  }
  .seal-disc::before{
    content:"";
    position:absolute;
    inset:6px;
    border-radius:inherit;
    border:1px dashed rgba(255,255,255,.35);
  }
  .seal-mono{
    position:absolute;
    inset:0;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--script);
    font-weight:400;
    font-size:18px;
    line-height:1;
    color:#ffffff;
    letter-spacing:-0.06em;
    padding-right:4px;
    transform:translateY(2px);
    text-shadow:0 1px 1px rgba(30,48,66,.45);
  }
  .seal-ring{
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border:1.5px solid var(--blue);
    opacity:0;
    animation:pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{
    0%{ transform:scale(.85); opacity:.55; }
    70%{ transform:scale(1.35); opacity:0; }
    100%{ opacity:0; }
  }
  @media (prefers-reduced-motion:reduce){
    .seal-ring{ animation:none; }
  }

  .hint{
    position:relative;
    text-align:center;
    margin-top:clamp(-44px,-5vmin,-8px);
    font-family:var(--sans);
    font-size:clamp(9px,2.6vw,11px);
    letter-spacing:clamp(.2em,1vw,.34em);
    text-transform:uppercase;
    color:var(--muted);
    white-space:nowrap;
    transition:opacity .4s ease;
  }
  .hint .arrow{ display:block; margin:0 auto 7px; width:1px;height:14px;background:linear-gradient(var(--blue),transparent); }
  .stage[data-phase="opening"] .hint,
  .stage[data-phase="open"] .hint{ opacity:0; height:0; margin:0; overflow:hidden; }

  /* ---------- countdown ---------- */
  .reveal{
    position:relative;
    z-index:6;
    height:0;
    overflow:hidden;
    margin-top:0;
    opacity:0;
    transform:translateY(14px);
    transition:opacity .9s ease 1.0s, transform .9s ease 1.0s;
    pointer-events:none;
  }
  .stage[data-phase="open"] .reveal{ height:auto; overflow:visible; margin-top:8px; opacity:1; transform:none; pointer-events:auto; }

  .reveal .lead{
    font-family:var(--script);
    font-size:clamp(24px,7vw,32px);
    color:var(--blue);
    margin:0 0 4px;
  }
  .reveal .when{
    font-family:var(--sans);
    letter-spacing:clamp(.18em,1vw,.3em);
    text-transform:uppercase;
    font-size:clamp(9.5px,2.8vw,11px);
    color:var(--muted);
    margin:0 0 14px;
  }
  .reveal .when b{ color:var(--ink); font-weight:500; }

  .countdown{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap:clamp(5px,1.6vw,10px);
  }
  .cell{
    position:relative;
    flex:1 1 0;
    max-width:96px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:3px;
    padding:clamp(11px,3vw,16px) clamp(3px,1.4vw,6px) clamp(9px,2.4vw,12px);
    box-shadow:0 8px 20px rgba(120,120,110,.06);
  }
  .cell::before{
    content:"";
    position:absolute;
    top:0;left:18%;right:18%;
    height:2px;
    background:var(--c,var(--sage));
    border-radius:2px;
  }
  .cell .n{
    font-family:var(--serif);
    font-weight:500;
    font-size:clamp(30px,9vw,46px);
    line-height:1;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .cell .l{
    font-family:var(--sans);
    font-weight:400;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:clamp(8px,2.2vw,9.5px);
    color:var(--c,var(--muted));
    margin-top:8px;
  }
  .cell.d{ --c:var(--sage); }
  .cell.h{ --c:var(--blue); }
  .cell.m{ --c:var(--pink); }
  .cell.s{ --c:#c2b48f; }

  .footer-note{
    font-family:var(--sans);
    font-size:10.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:26px;
  }

  .replay{
    margin-top:18px;
    background:none;
    border:1px solid var(--line);
    border-radius:40px;
    color:var(--muted);
    font-family:var(--sans);
    font-size:10.5px;
    letter-spacing:.2em;
    text-transform:uppercase;
    padding:8px 16px;
    cursor:pointer;
    opacity:0;
    transition:opacity .6s ease 1.3s, color .25s, border-color .25s;
  }
  .stage[data-phase="open"] .replay{ opacity:1; }
  .replay:hover{ color:var(--sage); border-color:var(--sage); }

  /* ---------- pétales roses ---------- */

  /* couche de pétales isolée du flux (n'affecte pas la mise en page) */
  #petal-layer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:8;
    perspective:600px;
  }

  /* surcharge de la forme par défaut de Sakura : vraie silhouette de pétale.
     On garde les animations fall/blow/sway de Sakura (dérive + chute) et on
     ajoute le flottement 3D via un pseudo-élément pour ne rien casser. */
  #petal-layer .sakura{
    background:none !important;
    border-radius:0 !important;
  }
  #petal-layer .sakura::before{
    content:"";
    position:absolute;
    inset:0;
    background-repeat:no-repeat;
    background-size:contain;
    background-position:center;
    /* pétale rose nénuphar (variante par défaut) */
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20120%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2250%25%22%20cy%3D%2292%25%22%20r%3D%2295%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23d98a98%22%2F%3E%3Cstop%20offset%3D%2222%25%22%20stop-color%3D%22%23e3aeb8%22%2F%3E%3Cstop%20offset%3D%2255%25%22%20stop-color%3D%22%23f0cdd3%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23fbeef0%22%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Cpath%20d%3D%22M50%20118%20C%2030%20100%2C%208%2078%2C%208%2050%20C%208%2026%2C%2024%208%2C%2043%206%20C%2047%2012%2C%2048%2016%2C%2050%2020%20C%2052%2016%2C%2053%2012%2C%2057%206%20C%2076%208%2C%2092%2026%2C%2092%2050%20C%2092%2078%2C%2070%20100%2C%2050%20118%20Z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Cpath%20d%3D%22M50%20112%20C%2049%2080%2C%2049%2050%2C%2050%2030%22%20fill%3D%22none%22%20stroke%3D%22%23cf7d8c%22%20stroke-width%3D%221.4%22%20stroke-linecap%3D%22round%22%20opacity%3D%220.35%22%2F%3E%3C%2Fsvg%3E");
    filter:drop-shadow(0 2px 2px rgba(120,90,95,.18));
    animation:petal-flutter 3.6s ease-in-out infinite;
  }
  /* variante rose pâle */
  #petal-layer .sakura.v1::before{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20120%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2250%25%22%20cy%3D%2292%25%22%20r%3D%2295%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23e3aeb8%22%2F%3E%3Cstop%20offset%3D%2222%25%22%20stop-color%3D%22%23ecc6cc%22%2F%3E%3Cstop%20offset%3D%2255%25%22%20stop-color%3D%22%23f4dde0%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23fdf4f5%22%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Cpath%20d%3D%22M50%20118%20C%2030%20100%2C%208%2078%2C%208%2050%20C%208%2026%2C%2024%208%2C%2043%206%20C%2047%2012%2C%2048%2016%2C%2050%2020%20C%2052%2016%2C%2053%2012%2C%2057%206%20C%2076%208%2C%2092%2026%2C%2092%2050%20C%2092%2078%2C%2070%20100%2C%2050%20118%20Z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Cpath%20d%3D%22M50%20112%20C%2049%2080%2C%2049%2050%2C%2050%2030%22%20fill%3D%22none%22%20stroke%3D%22%23d98a98%22%20stroke-width%3D%221.4%22%20stroke-linecap%3D%22round%22%20opacity%3D%220.35%22%2F%3E%3C%2Fsvg%3E");
  }
  /* variante presque blanche */
  #petal-layer .sakura.v2::before{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20120%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2250%25%22%20cy%3D%2292%25%22%20r%3D%2295%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23f0cdd3%22%2F%3E%3Cstop%20offset%3D%2222%25%22%20stop-color%3D%22%23f6dee1%22%2F%3E%3Cstop%20offset%3D%2255%25%22%20stop-color%3D%22%23faecee%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23ffffff%22%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Cpath%20d%3D%22M50%20118%20C%2030%20100%2C%208%2078%2C%208%2050%20C%208%2026%2C%2024%208%2C%2043%206%20C%2047%2012%2C%2048%2016%2C%2050%2020%20C%2052%2016%2C%2053%2012%2C%2057%206%20C%2076%208%2C%2092%2026%2C%2092%2050%20C%2092%2078%2C%2070%20100%2C%2050%20118%20Z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Cpath%20d%3D%22M50%20112%20C%2049%2080%2C%2049%2050%2C%2050%2030%22%20fill%3D%22none%22%20stroke%3D%22%23e3bec2%22%20stroke-width%3D%221.4%22%20stroke-linecap%3D%22round%22%20opacity%3D%220.35%22%2F%3E%3C%2Fsvg%3E");
  }

  /* flottement : balancement 2D dans le plan de l'écran — surface et opacité
     constantes, donc aucun clignotement ni variation de clarté */
  @keyframes petal-flutter{
    0%   { transform:rotateZ(-12deg) translateX(0); }
    50%  { transform:rotateZ(12deg)  translateX(8px); }
    100% { transform:rotateZ(-12deg) translateX(0); }
  }
  @media (prefers-reduced-motion:reduce){
    #petal-layer{ display:none; }
  }
</style>
</head>
<body>
  <main class="stage" data-phase="closed">

    <p class="eyebrow intro">Vous êtes invités</p>
    <p class="invite-names intro">au mariage d'Antoine &amp; Christelle</p>

    <div class="scene" id="scene">
      <img class="layer env-open"   src="https://lh3.googleusercontent.com/d/1xxe_sVpppaxnpLEt6UqBbFHmqHF3KBuJ"   alt="Enveloppe ouverte" draggable="false">
      <img class="layer contents" id="contents"  src="https://lh3.googleusercontent.com/d/1vc82mdiN5l8W3fcYogl5MKow5tlxApiO"        alt="Save the Date — 23 Juin 2027, Angerville" draggable="false">
      <img class="layer env-front"  src="https://lh3.googleusercontent.com/d/1xxe_sVpppaxnpLEt6UqBbFHmqHF3KBuJ"   alt="" aria-hidden="true" draggable="false">
      <img class="layer env-closed" src="https://lh3.googleusercontent.com/d/1MTt2SjOay7nhhJ5diblxn8Z2edxU4JTB" alt="Enveloppe fermée" draggable="false">

      <div class="seal" id="seal" role="button" tabindex="0" aria-label="Ouvrir l'enveloppe">
        <span class="seal-ring"></span>
        <span class="seal-disc"></span>
        <span class="seal-mono">AC</span>
      </div>
    </div>

    <div class="hint" id="hint"><span class="arrow"></span>Cliquez sur le sceau</div>

    <section class="reveal">
      <p class="lead">En attendant notre grand jour</p>
      <p class="when"><b>23 Juin 2027</b> &nbsp;·&nbsp; Angerville</p>
      <div class="countdown" id="countdown">
        <div class="cell d"><div class="n" id="cd-d">--</div><div class="l">Jours</div></div>
        <div class="cell h"><div class="n" id="cd-h">--</div><div class="l">Heures</div></div>
        <div class="cell m"><div class="n" id="cd-m">--</div><div class="l">Minutes</div></div>
        <div class="cell s"><div class="n" id="cd-s">--</div><div class="l">Secondes</div></div>
      </div>
      <button class="replay" id="replay">↺ Revoir l'enveloppe</button>
    </section>

  </main>

  <div id="petal-layer" aria-hidden="true"></div>

<script src="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.js"></script>
<script>
  (function(){
    var stage = document.querySelector('.stage');
    var seal  = document.getElementById('seal');
    var replay= document.getElementById('replay');
    var contents = document.getElementById('contents');

    contents.addEventListener('click', function(){
      if(stage.dataset.phase !== 'open') return;
      window.open(contents.src, '_blank', 'noopener');
    });

    /* ---- pétales roses (Sakura.js) : chute continue ---- */
    var burst = null, gentle = null;
    var reduceMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    // Sakura ajoute/retire des pétales en continu, ce qui décale :nth-child et
    // faisait "changer de couleur" les pétales. On fige une variante par pétale
    // dès sa création, via un MutationObserver — elle ne bouge plus ensuite.
    var petalLayer = document.getElementById('petal-layer');
    var petalObserver = new MutationObserver(function(mutations){
      mutations.forEach(function(m){
        m.addedNodes.forEach(function(node){
          if(node.nodeType === 1 && node.classList.contains('sakura') &&
             !node.classList.contains('v1') && !node.classList.contains('v2') &&
             !node.dataset.vset){
            node.dataset.vset = '1';
            var r = Math.random();
            if(r < 0.34) node.classList.add('v1');
            else if(r < 0.67) node.classList.add('v2');
            // sinon : variante par défaut (rose nénuphar)
          }
        });
      });
    });

    function startPetals(){
      if(reduceMotion || typeof Sakura === 'undefined') return;
      stopPetals();
      petalObserver.observe(petalLayer, { childList:true });
      // chute continue douce
      gentle = new Sakura('#petal-layer', {
        fallSpeed: 1.6,   // plus lent
        delay: 100,       // densité plus élevée
        minSize: 18,
        maxSize: 32
      });
    }
    function stopPetals(){
      petalObserver.disconnect();
      if(burst){ burst.stop(); burst = null; }
      if(gentle){ gentle.stop(); gentle = null; }
    }

    function open(){
      if(stage.dataset.phase !== 'closed') return;
      stage.dataset.phase = 'opening';
      setTimeout(function(){ stage.dataset.phase = 'open'; startPetals(); }, 620);
    }
    function close(){
      stage.dataset.phase = 'closed';
      stopPetals();
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    seal.addEventListener('click', open);
    seal.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); open(); }
    });
    replay.addEventListener('click', close);

    /* ---- countdown to 23 June 2027 ---- */
    var target = new Date(2027, 5, 23, 0, 0, 0).getTime(); // month 5 = June
    var els = {
      d:document.getElementById('cd-d'),
      h:document.getElementById('cd-h'),
      m:document.getElementById('cd-m'),
      s:document.getElementById('cd-s')
    };
    function pad(n){ return (n<10?'0':'')+n; }
    function tick(){
      var diff = target - Date.now();
      if(diff < 0) diff = 0;
      var s = Math.floor(diff/1000);
      var d = Math.floor(s/86400); s-=d*86400;
      var h = Math.floor(s/3600);  s-=h*3600;
      var m = Math.floor(s/60);    s-=m*60;
      els.d.textContent = d;
      els.h.textContent = pad(h);
      els.m.textContent = pad(m);
      els.s.textContent = pad(s);
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
</body>
</html>
